name: Publicar MPS en GitHub Pages

# Se ejecuta al hacer push a estas ramas, o manualmente desde la pestaña Actions.
on:
  push:
    branches:
      - main
      - "mps-01-despliegue-estatico-stlite-github-pages"
      - "mps-02-ux-visualizaciones-consumibles"
      - "mps-03-vista-autor-atribuciones"
  workflow_dispatch:

# Permisos necesarios para que Actions pueda publicar en Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un despliegue a la vez; si llega uno nuevo, cancela el anterior en curso.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  construir:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar el sitio estático
        run: |
          mkdir -p dist/BaseDeDatos
          cp index.html dist/index.html
          cp MPS.py dist/MPS.py
          cp BaseDeDatos/Pizarra_MPS_Master.json dist/BaseDeDatos/Pizarra_MPS_Master.json
          cp -r assets dist/assets

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir el artefacto del sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  desplegar:
    needs: construir
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
