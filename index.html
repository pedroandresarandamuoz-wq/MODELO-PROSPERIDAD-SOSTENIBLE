<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modelo de Prosperidad Sostenible (MPS)</title>
    <meta
      name="description"
      content="Modelo de Prosperidad Sostenible: análisis de indicadores macroeconómicos y parasitismo institucional. Ejecutado íntegramente en el navegador (stlite/WebAssembly), sin servidor."
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.css"
    />

    <style>
      html, body { margin: 0; padding: 0; height: 100%; }
      #root { height: 100%; }

      /* Pantalla de carga mientras Pyodide + Streamlit arrancan */
      #cargando {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #1f2937;
        background: #ffffff;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #cargando h1 { font-size: 1.25rem; margin: 0; }
      #cargando p { margin: 0; color: #6b7280; font-size: 0.9rem; }
      .spinner {
        width: 42px;
        height: 42px;
        border: 4px solid #e5e7eb;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: girar 0.9s linear infinite;
      }
      @keyframes girar { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="cargando">
      <div class="spinner"></div>
      <h1>Cargando el Modelo de Prosperidad Sostenible…</h1>
      <p>La aplicación se ejecuta dentro de tu navegador. La primera carga puede tardar unos segundos.</p>
    </div>

    <div id="root"></div>

    <script type="module">
      import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.js";

      mount(
        {
          // streamlit, pandas y numpy ya vienen incluidos en stlite.
          // Solo hace falta declarar lo que no está empaquetado:
          requirements: ["plotly"],
          entrypoint: "MPS.py",
          files: {
            // Cargamos el código y los datos por URL: no se duplican aquí,
            // se sirven como ficheros estáticos junto a este index.html.
            "MPS.py": { url: "./MPS.py" },
            "BaseDeDatos/Pizarra_MPS_Master.json": {
              url: "./BaseDeDatos/Pizarra_MPS_Master.json",
            },
            // PIB PPA per cápita: para la media ponderada del comparador.
            "BaseDeDatos/pib_ppa_2008_2023.json": {
              url: "./BaseDeDatos/pib_ppa_2008_2023.json",
            },
            // Dataset ERI (Inversión/CH) para la vista económica de inversión.
            "BaseDeDatos/Base_Datos_MPS_Final_ERI.json": {
              url: "./BaseDeDatos/Base_Datos_MPS_Final_ERI.json",
            },
            // NUEVOS ARCHIVOS DE LA V3.0 (Subsidio Exterior y Prosperidad Sostenible)
            "BaseDeDatos/PS.json": {
              url: "./BaseDeDatos/PS.json",
            },
            "BaseDeDatos/S_E.json": {
              url: "./BaseDeDatos/S_E.json",
            },
            "BaseDeDatos/interdependencia.json": {
              url: "./BaseDeDatos/interdependencia.json",
            }
          },
        },
        document.getElementById("root"),
      );

      // mount() de @stlite/browser no devuelve una promesa: retiramos la
      // pantalla de carga en cuanto Streamlit ha pintado su contenedor.
      const carga = document.getElementById("cargando");
      function ocultarCarga() {
        if (!carga) return;
        carga.style.opacity = "0";
        setTimeout(() => carga.remove(), 400);
      }
      const observador = new MutationObserver(() => {
        if (document.querySelector(".stApp, [data-testid='stAppViewContainer']")) {
          observador.disconnect();
          ocultarCarga();
        }
      });
      observador.observe(document.body, { childList: true, subtree: true });
      // Salvaguarda: si por lo que sea no se detecta, se retira igualmente.
      setTimeout(ocultarCarga, 30000);
    </script>
  </body>
</html>
